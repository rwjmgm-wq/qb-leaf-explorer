name: Update LEAF Data Daily

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 12pm UTC (7am EST)
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install nfl_data_py pandas numpy scipy pykalman

    - name: Update LEAF data
      run: |
        python - <<'EOF'
        import nfl_data_py as nfl
        import pandas as pd
        import numpy as np
        from datetime import datetime
        from pathlib import Path

        print("Fetching latest NFL data...")

        # Get current year
        current_year = datetime.now().year

        # Fetch latest play-by-play data for current season
        try:
            pbp_data = nfl.import_pbp_data([current_year])
            print(f"Fetched {len(pbp_data)} plays for {current_year}")

            # Create timestamp for filename
            timestamp = datetime.now().strftime('%Y%m%d')

            # Save to data/production with timestamp
            output_dir = Path('data/production')
            output_file = output_dir / f'nfl_pbp_{current_year}_{timestamp}.csv'

            pbp_data.to_csv(output_file, index=False)
            print(f"Saved to {output_file}")

            # Create a marker file to trigger Railway redeploy
            marker_file = output_dir / 'last_update.txt'
            with open(marker_file, 'w') as f:
                f.write(f"Last updated: {datetime.now().isoformat()}\n")
                f.write(f"Season: {current_year}\n")
                f.write(f"Games: {len(pbp_data)}\n")

            print("Update complete!")

        except Exception as e:
            print(f"Error updating data: {e}")
            exit(1)
        EOF

    - name: Commit updated data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/production/*.csv data/production/last_update.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update LEAF data [$(date +'%Y-%m-%d %H:%M UTC')]"

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
